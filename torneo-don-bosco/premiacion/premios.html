<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premios - Torneo Don Bosco</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/premios.css">
</head>
<body>

<!-- HEADER -->
<header class="header-simple">
    <div class="nav-container">
        <a href="../index.html" class="nav-home">
            <img src="../img/iconos/logo - copia.png" class="logo-simple">
            <span>Torneo Don Bosco</span>
        </a>
    </div>
</header>

<main class="premios-section">

    <h1 class="main-title">🏆 PREMIOS DEL TORNEO</h1>

    <div class="premios-grid">

    <!-- CAMPEÓN DESTACADO -->
    <div class="premio-card destacado" onclick="abrirModal('Campeón', 'Copa + Medallas + Premio especial')">
        <img src="../img/galeria/CAMPEONES.png">
        <div class="overlay">
            <h2>🏆 Campeón</h2>
        </div>
    </div>

    <div class="premio-card" onclick="abrirModal('Subcampeón', 'Medallas + Reconocimiento')">
        <img src="../img/galeria/SUBCAMPEON.png">
        <div class="overlay">
            <h2>🥈 Subcampeón</h2>
        </div>
    </div>

    <div class="premio-card" onclick="abrirModal('Goleador', 'Trofeo al máximo goleador')">
        <img src="../img/galeria/GOLEADOR.png">
        <div class="overlay">
            <h2>⚽ Goleador</h2>
        </div>
    </div>

    <div class="premio-card" onclick="abrirModal('Valla menos vencida', 'Premio al mejor arquero')">
        <img src="../img/galeria/ARQUERO.png">
        <div class="overlay">
            <h2>🧤 Valla menos vencida</h2>
        </div>
    </div>

    <div class="premio-card" onclick="abrirModal('Mejor jugador del partido', 'MVP')">
        <img src="../img/galeria/MVP.png">
        <div class="overlay">
            <h2>🔥 MVP</h2>
        </div>
    </div>

    <div class="premio-card" onclick="abrirModal('Jugador destacado', 'Premio consuelo')">
        <img src="../img/galeria/Jugador destacado.png">
        <div class="overlay">
            <h2>😎 Jugador destacado</h2>
        </div>
    </div>

</div>

</main>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        <h2 id="modalTitulo"></h2>
        <p id="modalTexto"></p>
    </div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-container">

        <p class="footer-text">
            © 2026 Torneo Oratorio Don Bosco
        </p>

        <div class="social-links">
            <a href="https://www.instagram.com/torneosdonbosco_oratorio/" class="social-link">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://github.com/nicololos06?tab=repositories" class="social-link">
                <i class="fab fa-github"></i>
            </a>
        </div>

    </div>
</footer> 
    <script src="../js/premios.js"></script>
</body>
</html>
